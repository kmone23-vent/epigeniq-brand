<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=DM+Sans:wght@300&amp;display=swap');
    </style>
  </defs>
  <!-- Background -->
  <rect width="880" height="220" fill="#A855F7"/>
  
  <!-- Icon mark — centred vertically, left-aligned -->
  <g transform="translate(32,50.0)">
  <!-- outer orbit ring -->
  <circle cx="60.0" cy="60.0" r="31.50" stroke="#F8FAF2" stroke-width="1.20" stroke-dasharray="6.0 3.0" fill="none" opacity="0.38"/>
  <!-- inner scan ring -->
  <circle cx="60.0" cy="60.0" r="22.50" stroke="#F8FAF2" stroke-width="2.25" fill="none" opacity="0.85"/>
  <!-- cardinal arms -->
  <line x1="37.50" y1="60.0" x2="48.00" y2="60.0" stroke="#F8FAF2" stroke-width="2.25" stroke-linecap="round"/>
  <line x1="72.00" y1="60.0" x2="82.50" y2="60.0" stroke="#F8FAF2" stroke-width="2.25" stroke-linecap="round"/>
  <line x1="60.0" y1="37.50" x2="60.0" y2="48.00" stroke="#F8FAF2" stroke-width="2.25" stroke-linecap="round"/>
  <line x1="60.0" y1="72.00" x2="60.0" y2="82.50" stroke="#F8FAF2" stroke-width="2.25" stroke-linecap="round"/>
  <!-- diagonal AI accents -->
  <line x1="44.09" y1="44.09" x2="50.09" y2="50.09" stroke="#B8F000" stroke-width="1.80" stroke-linecap="round" opacity="0.9"/>
  <line x1="75.91" y1="75.91" x2="69.91" y2="69.91" stroke="#B8F000" stroke-width="1.80" stroke-linecap="round" opacity="0.9"/>
  <!-- violet nucleus -->
  <circle cx="60.0" cy="60.0" r="5.40" fill="#B8F000"/>
  </g>
  <!-- Wordmark -->
  <text x="160" y="130.0" font-family="'Syne', Arial Black, sans-serif" font-weight="800" font-size="52" fill="#F8FAF2">Epi</text>
  <text x="189.6" y="130.0" font-family="'Syne', Arial Black, sans-serif" font-weight="800" font-size="52" fill="#B8F000">Gen</text>
  <text x="221.9" y="130.0" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="55" fill="#F8FAF2">IQ</text>
  <text x="160" y="153" font-family="'DM Sans', Arial, sans-serif" font-weight="300" font-size="15" fill="rgba(248,250,242,0.38)" letter-spacing="3">HEALTH INTELLIGENCE</text>
  <!-- Variant label -->
  <rect x="0" y="198" width="880" height="22" fill="rgba(0,0,0,0.35)"/>
  <text x="440" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="#F8FAF2" opacity="0.6">06 · ACCENT · VIOLET</text>
</svg>