  <line x1="48.00" y1="40.0" x2="55.00" y2="40.0" stroke="#B8F000" stroke-width="1.50" stroke-linecap="round"/>
  <line x1="40.0" y1="25.00" x2="40.0" y2="32.00" stroke="#B8F000" stroke-width="1.50" stroke-linecap="round"/>
  <line x1="40.0" y1="48.00" x2="40.0" y2="55.00" stroke="#B8F000" stroke-width="1.50" stroke-linecap="round"/>
  <!-- diagonal AI accents -->
  <line x1="29.39" y1="29.39" x2="33.39" y2="33.39" stroke="#A855F7" stroke-width="1.20" stroke-linecap="round" opacity="0.9"/>
